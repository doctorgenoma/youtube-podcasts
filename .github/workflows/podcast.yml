name: Sync YouTube Podcast

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Instalar yt-dlp
        run: pip install yt-dlp

      # PASO CORREGIDO: Pasamos el secreto a 'env' primero y el 'if' lee el 'env'
      - name: Configurar Cookies de YouTube
        env:
          TEMP_COOKIES: ${{ secrets.YT_COOKIES }}
        if: env.TEMP_COOKIES != ''
        run: |
          echo "$TEMP_COOKIES" > cookies.txt

      - name: Ejecutar script de Python
        run: python process_podcast.py

      - name: Eliminar Cookies temporales
        run: rm -f cookies.txt

      - name: Subir MP3 a GitHub Releases
        if: env.NEW_EPISODES == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: episodes
          files: downloads/*.mp3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "PodcastBot"
          git config --global user.email "bot@podcast.com"
          git add podcast_data.json feed.xml || true
          
          if git diff --staged --quiet; then
            echo "No hay cambios en los archivos. Nada que subir."
          else
            git commit -m "Bot: Actualizar feed del podcast"
            git push origin main || git push origin master
          fi
