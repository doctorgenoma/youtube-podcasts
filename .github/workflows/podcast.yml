name: Sync YouTube Podcast

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Instalar yt-dlp actualizado
        run: |
          python3 -m pip install --upgrade pip
          pip install --no-cache-dir https://github.com/yt-dlp/yt-dlp/archive/master.tar.gz

      - name: Ejecutar script de Python
        run: python process_podcast.py

      # PASO NUEVO: Verificamos en los logs si el MP3 existe físicamente
      - name: Verificar archivos descargados
        run: |
          echo "=== Contenido de la carpeta downloads ==="
          ls -la downloads/ || echo "La carpeta downloads está VACÍA"

      # ACTUALIZACIÓN: Eliminamos el 'if' para forzar a GitHub a intentar la subida siempre
      - name: Subir MP3 a GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: episodes
          files: downloads/*.mp3
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Guardar cambios en el repositorio
        run: |
          git config --global user.name "PodcastBot"
          git config --global user.email "bot@podcast.com"
          git add podcast_data.json feed.xml || true
          
          if git diff --staged --quiet; then
            echo "No hay cambios en los archivos. Nada que subir."
          else
            git commit -m "Bot: Actualizar feed del podcast"
            git push origin main || git push origin master
          fi
